name: macOS Tests (Swift)

on:
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main
  workflow_dispatch:

jobs:
  macos-tests:
    name: Swift ${{ matrix.swift-version }} (macOS)
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - swift-version: '5.10'
            xcode-version: '15.4'
            runner: macos-14
          - swift-version: '6.1'
            xcode-version: '16.4'
            runner: macos-15
          - swift-version: '6.2'
            xcode-version: '26.2'
            runner: macos-15
    env:
      DEVELOPER_DIR: "/Applications/Xcode_${{ matrix.xcode-version }}.app/Contents/Developer"
    steps:
    - name: "⬇️ Checkout"
      uses: actions/checkout@v2
    - name: "🛠 Build and Run Tests"
      run: swift test --parallel
    - name: "🛠 Build Release"
      run: swift build --configuration release
